    <style>
        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
            padding-top: 80px;
        }

        /* Nav back button */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(0, 8, 6, 0.9);
            border: 1.5px solid rgba(0, 204, 255, 0.4);
            border-radius: 4px;
            color: #00ccff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 204, 255, 0.1);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .back-btn:hover {
            border-color: rgba(0, 255, 204, 0.8);
            color: #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
            transform: translateX(-5px);
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(0, 204, 255, 0.2);
            transition: all 0.4s ease;
            background: #001111;
            aspect-ratio: 4/3;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 315px;
            max-width: 100%;
        }

        /* Aici se creeaza efectul de contur si glow la hover */
        .gallery-item:hover {
            border-color: #00ccff;
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.4);
            transform: translateY(-5px) scale(1.02);
            z-index: 2;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
            filter: brightness(0.8) contrast(1.1);
            display: block;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
            filter: brightness(1) contrast(1.2);
        }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        #lightbox.visible {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #lightbox-img {
            max-width: 90%;
            max-height: 90vh;
            box-shadow: 0 0 30px rgba(0, 204, 255, 0.3);
            border: 2px solid rgba(0, 204, 255, 0.5);
            border-radius: 4px;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        
        #lightbox.visible #lightbox-img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            transition: color 0.3s ease;
            z-index: 10000;
        }

        .lightbox-close:hover {
             color: #00ccff;
             text-shadow: 0 0 10px #00ccff;
        }
        
        /* Loading animation */
        .loading-scan {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,204,255,0.2), transparent);
            animation: scan 2s infinite linear;
            pointer-events: none;
        }
        
        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }
    </style>
</head>

    <script>
        // Stars background
        const starsBg = document.querySelector('.stars-bg');
        if (starsBg) {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.width = Math.random() * 2 + 'px';
                star.style.height = star.style.width;
                star.style.background = '#fff';
                star.style.borderRadius = '50%';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                star.style.animation = `twinkle ${Math.random() * 3 + 1}s infinite alternate`;
                starsBg.appendChild(star);
            }
        }

        const style = document.createElement('style');
        style.textContent = `
            .stars-bg {
                position: fixed;
                top: 0; left: 0; right: 0; bottom: 0;
                z-index: -1;
                pointer-events: none;
            }
            @keyframes twinkle {
                0% { opacity: 0.2; transform: scale(0.8); }
                100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 5px #fff; }
            }
        `;
        document.head.appendChild(style);

        // Lightbox logic
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(e) {
            if (e.target.id === 'lightbox' || e.target.classList.contains('lightbox-close')) {
                const lightbox = document.getElementById('lightbox');
                lightbox.classList.remove('visible');
                document.body.style.overflow = 'auto';
                
                setTimeout(() => {
                    document.getElementById('lightbox-img').src = '';
                }, 300);
            }
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                const lightbox = document.getElementById('lightbox');
                if (lightbox.classList.contains('visible')) {
                    closeLightbox({target: lightbox});
                }
            }
        });
    </script>
